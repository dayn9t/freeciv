name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson libcmocka-dev lcov

    - name: Setup build
      run: meson setup build -Dtests=true -Dcoverage=true

    - name: Compile
      run: meson compile -C build

    - name: Run tests
      run: meson test -C build --verbose

    - name: Check coverage
      run: python3 scripts/check_coverage.py --build-dir build --threshold 85

    - name: Upload coverage report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage_report/
