name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build libcmocka-dev lcov genhtml

    - name: Setup build
      run: meson setup build -Dtests=true -Dcoverage=true

    - name: Compile
      run: meson compile -C build

    - name: Run tests
      run: meson test -C build --verbose
      continue-on-error: true
      id: test-run

    - name: Generate coverage report
      run: |
        lcov --ignore-errors=gcov,unused,empty \
          --capture --directory build \
          --output-file build/coverage_total.info

        lcov --ignore-errors=empty,unused \
          --remove build/coverage_total.info \
          '*/dependencies/*' \
          '*/tests/*' \
          '*/build/*' \
          '*/tolua_*.c' \
          '*/utility/*' \
          '*/common/scriptcore/*' \
          '*/common/networking/connection.c' \
          '*/common/aicore/cm.c' \
          '*/common/aicore/path_finding.c' \
          --output-file build/coverage_filtered.info

        genhtml build/coverage_filtered.info \
          --output-directory coverage_report \
          --title "Freeciv Test Coverage" \
          --ignore-errors unused

    - name: Check coverage threshold
      run: |
        COVERAGE=$(lcov --summary build/coverage_filtered.info 2>&1 | grep "lines" | head -1 | sed 's/.*: \([0-9.]*\)%.*/\1/')
        THRESHOLD=25.0
        echo "Coverage: ${COVERAGE}%"
        echo "Threshold: ${THRESHOLD}%"
        if (( $(echo "$COVERAGE >= $THRESHOLD" | bc -l) )); then
          echo "Coverage requirement met!"
        else
          GAP=$(echo "$THRESHOLD - $COVERAGE" | bc -l)
          echo "Coverage gap: ${GAP}%"
          exit 1
        fi

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage_report/
        retention-days: 30

    - name: Check test status
      if: steps.test-run.outcome == 'failure'
      run: exit 1
